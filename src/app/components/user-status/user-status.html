<!-- Main container -->
<div>

  <!-- Status indicator dot -->
  <!-- Dynamic class changes based on isOnline value -->
  <span class="dot" [class.online]="isOnline"></span>

  <!-- Display text using conditional (ternary) operator -->
  {{ isOnline ? 'Online' : 'Offline' }}

  <!-- Button to trigger toggle() function -->
  <!-- (click) is event binding -->
  <button (click)="toggle()">Toggle</button>

</div>
