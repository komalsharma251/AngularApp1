<div class="dashboard" [class.dark]="isDarkMode">

  <div class="top-bar">
    <h1>User Profile</h1>
    <button class="dark-btn" (click)="toggleDarkMode()">
      Toggle Dark Mode
    </button>
  </div>

  <div class="profile-wrapper">

    <app-user-card [user]="user"></app-user-card>

    <app-user-status 
      [isOnline]="user.isOnline"
      (statusChange)="toggleStatus()">
    </app-user-status>

    <app-user-bio
      [bio]="user.bio"
      (bioChange)="updateBio($event)">
    </app-user-bio>

  </div>

</div>
